<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>富住通賓果大樂透 - 標題跑馬燈版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&display=swap');

        :root {
            --bg-red: #e60012;
            --inner-panel: #8d191d;
            --text-yellow: #fff200;
            --gold-sphere: radial-gradient(circle at 35% 35%, #fff9c4 0%, #ffeb3b 30%, #fbc02d 60%, #e65100 100%);
            --btn-yellow: linear-gradient(to bottom, #fffde7 0%, #ffeb3b 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #1a1a1a;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Noto Sans TC', sans-serif;
        }

        /* 畫布鎖定 1920x1080 */
        #canvas {
            position: relative;
            width: 1920px;
            height: 1080px;
            background-color: var(--bg-red);
            display: flex;
            flex-direction: column;
            border: 4px solid #9a1a1a;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            flex-shrink: 0;
            overflow: hidden; 
            transform-origin: center;
        }

        header {
            height: 22%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 10px;
        }

        .main-title {
            font-size: 190px;
            letter-spacing: 12px;
            white-space: nowrap;
            animation: breathe 2s infinite ease-in-out;
            user-select: none;
            text-shadow: none !important;
        }

        @keyframes breathe {
            0%, 100% { color: var(--text-yellow); }
            50% { color: #ffffff; }
        }

        main {
            height: 78%;
            display: flex;
            padding: 0 80px 60px 80px;
            gap: 40px;
        }

        .number-board {
            position: relative;
            width: 1250px;
            height: 100%; 
            background: var(--inner-panel);
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            padding: 30px 40px;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.6);
            border: 2px solid rgba(255,255,255,0.1);
        }

        /* 得獎號碼標題：更大、四色跑馬燈效果 */
        .board-label {
            font-size: 64px; /* 字體加大 */
            text-align: center;
            margin-bottom: 25px;
            font-weight: 900;
            letter-spacing: 15px;
            animation: titleMarquee 1.5s infinite;
            text-shadow: none;
        }

        @keyframes titleMarquee {
            0%, 100% { color: #fff200; } /* 黃 */
            25% { color: #ff3333; }      /* 紅 */
            50% { color: #33ccff; }      /* 藍 */
            75% { color: #33ff33; }      /* 綠 */
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 15px;
            flex: 1;
            align-items: center;
            justify-items: center;
        }

        .slot {
            background: rgba(0,0,0,0.4);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
            max-width: 65px;
            aspect-ratio: 1 / 1;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }

        .ball-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ball {
            width: 92%;
            height: 92%;
            background: var(--gold-sphere);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #111;
            font-weight: 900;
            font-size: 30px;
            opacity: 0;
            transform: scale(0.4);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 2px 4px 8px rgba(0,0,0,0.4);
        }

        .ball.active {
            opacity: 1;
            transform: scale(1);
        }

        .control-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }

        .display-circle {
            width: 440px;
            height: 440px;
            background: white;
            border-radius: 50%;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .inner-display {
            width: 100%;
            height: 100%;
            background: var(--gold-sphere);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 4px solid #333;
        }

        #current-num {
            font-size: 240px;
            color: #111;
            font-weight: 900;
        }

        #draw-btn {
            width: 400px;
            height: 120px;
            background: var(--btn-yellow);
            border: 6px solid #222;
            border-radius: 80px;
            font-size: 64px;
            font-weight: 900;
            color: #111;
            cursor: pointer;
            box-shadow: 0 12px 0 #6d0b0e;
            transition: all 0.1s;
        }

        #draw-btn:active {
            transform: translateY(8px);
            box-shadow: 0 4px 0 #6d0b0e;
        }

        .stats {
            color: var(--text-yellow);
            font-size: 36px;
            font-weight: bold;
        }

        .lights-container {
            position: absolute;
            top: 25px; left: 25px; right: 25px; bottom: 25px;
            pointer-events: none;
            z-index: 100;
        }
        .bulb {
            position: absolute;
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px #fff;
            animation: blinkBulb 0.8s infinite alternate;
            transform: translate(-50%, -50%);
        }
        @keyframes blinkBulb { 
            from { opacity: 0.3; transform: translate(-50%, -50%) scale(0.8); } 
            to { opacity: 1; transform: translate(-50%, -50%) scale(1.1); } 
        }

        #reset {
            position: absolute;
            bottom: 30px;
            right: 30px;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            cursor: pointer;
            z-index: 110;
        }
    </style>
</head>
<body>

    <div id="canvas">
        <div id="lights" class="lights-container"></div>
        <div id="reset" onclick="resetGame()">重設 (R)</div>

        <header>
            <h1 class="main-title">富住通賓果大樂透</h1>
        </header>

        <main>
            <section class="number-board">
                <div class="board-label">得獎號碼</div>
                <div id="bingo-grid" class="grid"></div>
            </section>

            <section class="control-panel">
                <div class="display-circle">
                    <div class="inner-display">
                        <div id="current-num">?</div>
                    </div>
                </div>

                <button id="draw-btn">按鈕</button>

                <div class="stats">
                    剩餘號碼：<span id="rem">75</span> / 75
                </div>
            </section>
        </main>
    </div>

    <script>
        // 音效系統
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function playSound(type) {
            if (!audioCtx) audioCtx = new AudioContext();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'click') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'spin') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(200 + Math.random() * 300, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'win') {
                const now = audioCtx.currentTime;
                const freqs = [523.25, 659.25, 783.99, 1046.50];
                freqs.forEach((f, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.type = 'square';
                    o.frequency.setValueAtTime(f, now + (i * 0.1));
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    g.gain.setValueAtTime(0.1, now + (i * 0.1));
                    g.gain.exponentialRampToValueAtTime(0.01, now + (i * 0.1) + 0.3);
                    o.start(now + (i * 0.1));
                    o.stop(now + (i * 0.1) + 0.3);
                });
            }
        }

        function handleResize() {
            const canvas = document.getElementById('canvas');
            const winW = window.innerWidth;
            const winH = window.innerHeight;
            const scale = Math.min(winW / 1920, winH / 1080);
            canvas.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', handleResize);

        function initLights() {
            const container = document.getElementById('lights');
            container.innerHTML = '';
            const w = 1870; 
            const h = 1030; 
            const step = 45; 
            for(let x=0; x <= w; x += step) addBulb(x, 0, x/w);
            for(let x=0; x <= w; x += step) addBulb(x, h, 1 - x/w);
            for(let y=step; y < h; y += step) addBulb(0, y, 1 - y/h);
            for(let y=step; y < h; y += step) addBulb(w, y, y/h);
        }

        function addBulb(x, y, delay) {
            const b = document.createElement('div');
            b.className = 'bulb';
            b.style.left = x + 'px';
            b.style.top = y + 'px';
            b.style.animationDelay = (delay * 1.5) + 's';
            document.getElementById('lights').appendChild(b);
        }

        const MAX = 75;
        let pool = Array.from({length: MAX}, (_, i) => i + 1);
        let drawnHistory = [];
        let isSpinning = false;

        function buildGrid() {
            const grid = document.getElementById('bingo-grid');
            grid.innerHTML = '';
            for(let i=0; i<MAX; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot';
                const container = document.createElement('div');
                container.className = 'ball-container';
                const ball = document.createElement('div');
                ball.className = 'ball';
                ball.id = `slot-${i}`;
                container.appendChild(ball);
                slot.appendChild(container);
                grid.appendChild(slot);
            }
        }

        function draw() {
            if(isSpinning || pool.length === 0) return;
            isSpinning = true;
            playSound('click');
            const btn = document.getElementById('draw-btn');
            const display = document.getElementById('current-num');
            btn.disabled = true;
            let count = 0;
            const roll = setInterval(() => {
                display.innerText = Math.floor(Math.random() * MAX) + 1;
                playSound('spin');
                count++;
                if(count > 25) {
                    clearInterval(roll);
                    finishDraw();
                }
            }, 60);
        }

        function finishDraw() {
            const display = document.getElementById('current-num');
            const btn = document.getElementById('draw-btn');
            const idx = Math.floor(Math.random() * pool.length);
            const num = pool.splice(idx, 1)[0];
            display.innerText = num;
            playSound('win');
            drawnHistory.push(num);
            const pos = drawnHistory.length - 1; 
            const targetBall = document.getElementById(`slot-${pos}`);
            if(targetBall) {
                targetBall.innerText = num;
                targetBall.classList.add('active');
            }
            document.getElementById('rem').innerText = pool.length;
            const count = 200;
            const defaults = { origin: { y: 0.7 } };
            function fire(particleRatio, opts) {
                confetti({...defaults, ...opts, particleCount: Math.floor(count * particleRatio)});
            }
            fire(0.25, { spread: 26, startVelocity: 55 });
            fire(0.2, { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
            fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
            fire(0.1, { spread: 120, startVelocity: 45 });
            isSpinning = false;
            btn.disabled = false;
        }

        function resetGame() {
            if(!confirm("確定要重設並清空所有得獎號碼嗎？")) return;
            pool = Array.from({length: MAX}, (_, i) => i + 1);
            drawnHistory = [];
            document.getElementById('current-num').innerText = "?";
            document.getElementById('rem').innerText = MAX;
            document.querySelectorAll('.ball').forEach(b => {
                b.classList.remove('active');
                b.innerText = "";
            });
        }

        window.onload = () => {
            initLights();
            buildGrid();
            handleResize();
        };

        document.getElementById('draw-btn').onclick = draw;
        window.onkeydown = (e) => {
            if(e.code === 'Space' || e.code === 'Enter') draw();
            if(e.key.toLowerCase() === 'r') resetGame();
        };
    </script>
</body>
</html>
