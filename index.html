<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>富住通賓果大樂透 - 歡樂音效版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&display=swap');

        :root {
            --primary-red: #e60012;
            --panel-bg: #8b0000;
            --gold-sphere: radial-gradient(circle at 35% 35%, #fff9c4 0%, #ffeb3b 30%, #fbc02d 60%, #e65100 100%);
            --text-gold: #ffcc00; 
            --bulb-on: #fff000;
            --bulb-off: #5a0000;
        }

        body {
            background-color: #1a1a1a;
            margin: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Noto Sans TC', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #main-stage {
            position: relative;
            width: 96vw;
            height: 92vh;
            background-color: var(--primary-red);
            border: 20px solid #c00000;
            outline: 6px solid #ffcc00;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            padding: 2vh 2.5vw;
            box-sizing: border-box;
            box-shadow: 0 0 60px rgba(0,0,0,1);
        }

        #marquee-container {
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            pointer-events: none;
            z-index: 50;
        }

        .bulb {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: var(--bulb-off);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(0,0,0,0.3);
        }

        @keyframes marquee-flash {
            0%, 20% { 
                background-color: var(--bulb-on); 
                box-shadow: 0 0 15px var(--bulb-on), 0 0 25px #ffffff;
                transform: translate(-50%, -50%) scale(1.3);
            }
            21%, 100% { 
                background-color: var(--bulb-off); 
                box-shadow: none;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        #header {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 12vh; 
            margin-bottom: 1.5vh;
            flex-shrink: 0;
            z-index: 10;
        }

        #title-text {
            font-size: 5.5vw;
            font-weight: 900;
            color: var(--text-gold);
            font-style: italic;
            letter-spacing: 0.5vw;
            margin: 0;
            animation: title-breathe 2.5s infinite ease-in-out;
        }

        @keyframes title-breathe {
            0%, 100% {
                text-shadow: 0 0 15px rgba(255, 204, 0, 0.6), 4px 4px 6px rgba(0, 0, 0, 0.7);
                filter: brightness(1);
            }
            50% {
                text-shadow: 0 0 40px rgba(255, 204, 0, 1), 0 0 60px rgba(255, 255, 255, 0.6), 4px 4px 6px rgba(0, 0, 0, 0.8);
                filter: brightness(1.3);
                transform: scale(1.03);
            }
        }

        #content-area {
            display: flex;
            flex: 1;
            gap: 2.5vw;
            min-height: 0; 
            padding-bottom: 2vh;
            z-index: 10;
        }

        #left-panel, #right-panel {
            flex: 1;
            background: var(--panel-bg);
            border-radius: 25px;
            border: 4px solid #600000;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            padding: 2vh; 
            min-height: 0; 
            position: relative;
        }

        #left-panel h3 {
            color: #fff;
            text-align: center;
            font-size: 1.6vw;
            margin-bottom: 1.5vh;
            flex-shrink: 0;
        }

        #bingo-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 1vh;
            min-height: 0; 
            justify-items: center; 
            align-items: center;
        }

        .slot {
            background: rgba(0,0,0,0.4);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 85%; 
            aspect-ratio: 1/1; 
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }

        .gold-ball {
            width: 100%;
            height: 100%;
            background: var(--gold-sphere);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #3e2723;
            font-size: 2.2vw; 
            font-weight: 900;
            box-shadow: 0 4px 8px rgba(0,0,0,0.6);
            transform: scale(0);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            line-height: 1;
        }
        .gold-ball.active { transform: scale(1); }

        #right-panel {
            justify-content: space-around; 
            align-items: center;
        }

        #sphere-big {
            width: 18vw;
            height: 18vw;
            max-width: 32vh; 
            max-height: 32vh;
            background: var(--gold-sphere);
            border-radius: 50%;
            border: 8px solid #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            flex-shrink: 0;
        }

        #sphere-number {
            font-size: 9vw;
            font-weight: 900;
            color: #3e2723;
        }

        #draw-btn {
            width: 85%;
            padding: 1.5vh 0;
            background: linear-gradient(180deg, #ffeb3b 0%, #fbc02d 45%, #e65100 100%);
            border: 4px solid #3e2723;
            border-radius: 50px;
            color: #3e2723;
            font-size: 2.8vw;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 6px 0 #2a1b0a;
            transition: all 0.1s;
            flex-shrink: 0;
            user-select: none;
        }

        #draw-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #2a1b0a;
        }

        #rem-status {
            color: #ffcc00;
            font-size: 1.4vw;
            flex-shrink: 0;
        }

        #reset-btn {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 5px;
            font-size: 0.8vw;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 60;
        }
        #reset-btn:hover {
            background: rgba(255,255,255,0.3);
            color: white;
        }

        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        #modal-box {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .modal-btn {
            padding: 10px 20px;
            margin: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="modal-overlay">
        <div id="modal-box">
            <h2 class="text-2xl font-bold mb-4">確定要重新開始嗎？</h2>
            <p class="mb-6">這會清空目前所有的開獎號碼。</p>
            <button onclick="resetGame()" class="modal-btn bg-red-600 text-white">確定重新開局</button>
            <button onclick="closeModal()" class="modal-btn bg-gray-200">取消</button>
        </div>
    </div>

    <div id="main-stage">
        <button id="reset-btn" onclick="openModal()">重新開局 (R)</button>
        <div id="marquee-container"></div>
        <div id="header">
            <h1 id="title-text">富住通賓果大樂透</h1>
        </div>
        <div id="content-area">
            <div id="left-panel">
                <h3>得獎號碼</h3>
                <div id="bingo-grid"></div>
            </div>
            <div id="right-panel">
                <div id="sphere-big">
                    <div id="sphere-number">?</div>
                </div>
                <button id="draw-btn">賓果按鈕</button>
                <div id="rem-status">剩餘號碼：<span id="rem-count">75</span> / 75</div>
            </div>
        </div>
    </div>

    <script>
        // 音效系統
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function playSound(type) {
            if (!audioCtx) audioCtx = new AudioCtx();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'spin') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.exponentialRampToValueAtTime(880, now + 0.05);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.start(now);
                osc.stop(now + 0.05);
            } else if (type === 'win') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(523.25, now); // C5
                osc.frequency.exponentialRampToValueAtTime(1046.5, now + 0.3); // C6
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
                // 額外的和弦效果
                const osc2 = audioCtx.createOscillator();
                osc2.connect(gain);
                osc2.frequency.setValueAtTime(659.25, now); // E5
                osc2.start(now);
                osc2.stop(now + 0.5);
            } else if (type === 'reset') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, now);
                osc.frequency.exponentialRampToValueAtTime(440, now + 0.2);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            }
        }

        function initMarquee() {
            const container = document.getElementById('marquee-container');
            container.innerHTML = ''; 
            const rect = container.getBoundingClientRect();
            if (rect.width === 0) { setTimeout(initMarquee, 100); return; }

            const width = rect.width;
            const height = rect.height;
            const targetSpacing = 35; 
            const hCount = Math.round(width / targetSpacing);
            const vCount = Math.round(height / targetSpacing);
            const hGap = width / hCount;
            const vGap = height / vCount;
            
            let points = [];
            for (let i = 0; i < hCount; i++) points.push({x: i * hGap, y: 0});
            for (let i = 0; i < vCount; i++) points.push({x: width, y: i * vGap});
            for (let i = hCount; i > 0; i--) points.push({x: i * hGap, y: height});
            for (let i = vCount; i > 0; i--) points.push({x: 0, y: i * vGap});

            const total = points.length;
            const cycleDuration = 2.0; 

            points.forEach((p, i) => {
                const b = document.createElement('div');
                b.className = 'bulb';
                b.style.left = p.x + 'px';
                b.style.top = p.y + 'px';
                b.style.animation = `marquee-flash ${cycleDuration}s linear infinite`;
                b.style.animationDelay = `${(i / total) * cycleDuration}s`;
                container.appendChild(b);
            });
        }

        window.addEventListener('resize', initMarquee);
        window.onload = initMarquee;

        const MAX_POOL = 75; 
        let drawPool = Array.from({length: MAX_POOL}, (_, i) => i + 1);
        let drawnResults = [];
        let isProcessing = false;

        const grid = document.getElementById('bingo-grid');
        const sphereNumDisplay = document.getElementById('sphere-number');
        const remDisplay = document.getElementById('rem-count');

        function createGrid() {
            grid.innerHTML = '';
            for(let i=0; i<25; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.id = `slot-${i}`;
                grid.appendChild(slot);
            }
        }
        createGrid();

        function startDraw() {
            if (isProcessing || drawnResults.length >= 25 || drawPool.length === 0) return;
            isProcessing = true;
            let count = 0;
            const spin = setInterval(() => {
                sphereNumDisplay.innerText = Math.floor(Math.random() * MAX_POOL) + 1;
                playSound('spin'); // 滾動聲
                count++;
                if (count > 15) { clearInterval(spin); executeResult(); }
            }, 60);
        }

        function executeResult() {
            const idx = Math.floor(Math.random() * drawPool.length);
            const num = drawPool.splice(idx, 1)[0];
            sphereNumDisplay.innerText = num;
            drawnResults.push(num);
            remDisplay.innerText = drawPool.length;
            
            const slot = document.getElementById(`slot-${drawnResults.length - 1}`);
            const ball = document.createElement('div');
            ball.className = 'gold-ball';
            ball.innerText = num;
            slot.appendChild(ball);
            
            setTimeout(() => {
                ball.classList.add('active');
                playSound('win'); // 獲勝開獎聲
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#ffcc00', '#ffffff', '#e60012'] });
                isProcessing = false;
            }, 50);
        }

        function openModal() {
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        function resetGame() {
            playSound('reset'); // 重置聲
            drawPool = Array.from({length: MAX_POOL}, (_, i) => i + 1);
            drawnResults = [];
            isProcessing = false;
            sphereNumDisplay.innerText = '?';
            remDisplay.innerText = MAX_POOL;
            createGrid();
            closeModal();
            confetti({ particleCount: 50, spread: 50, origin: { y: 0.9 } });
        }

        document.getElementById('draw-btn').addEventListener('click', startDraw);

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r') {
                openModal();
                return;
            }
            if (document.getElementById('modal-overlay').style.display === 'flex') return;
            startDraw();
            if (e.key === " ") e.preventDefault();
        });

        // 啟動音效環境
        document.body.addEventListener('click', () => {
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }, { once: true });
    </script>
</body>
</html>
